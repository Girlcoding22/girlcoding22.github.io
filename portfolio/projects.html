    <h1>Project Page:</h1>
    <p>Here is a quick list of all past projects that I have worked on</p>

    <!--make a dropdown directory of different categories: web development, games, and data analytics/science:, passion projects-->
    <div>
      <label for="project-category">Choose a category:</label>
      <select id="project-category" onchange="showCategoryInfo()">
        <option value="">--Select--</option>
        <option value="webdev">Web Development</option>
        <option value="games">Games</option>
        <option value="data">Data Analytics/Science</option>
        <option value="passion">Passion Projects</option>
      </select>
    </div>
    <div id="category-info" style="display:none; margin-top:10px; border:1px solid #ccc; padding:10px;"></div>
    <script>
      function showCategoryInfo() {
        const info = {
          webdev: "<p>Web development projects, including HTML, CSS, and JavaScript.</p><br>"
              + "<p>Project Name: Echoes of Time: </p>" + "<br>*insert information of the website here",
              //screenshot of the game so far, and link to download the game(along with the game website), the screenshot will hold hyperlink to the website

          games: "<p>Game development projects, including C# and Unity work.</p><br>"
          +"I am also part of a Game design and development club, as a freshman in college. I am right now learning how to code C# for videogames, like <i>Super Squeak Fighter</i>."+
          " I worked on creating a moveable platform and the power system for one of the characters." ,
          //screenshot of the homepage(or gif), then link to it

          data: "<p>Data analytics and science projects using Python, R, or similar tools.</p>"+
          "<br>",

          passion: "<p>Personal passion projects outside of coursework or clubs.</p>"
        };
        const select = document.getElementById('project-category');
        const value = select.value;
        const infoDiv = document.getElementById('category-info');
        if (info[value]) {
          infoDiv.style.display = 'block';
          infoDiv.innerHTML = info[value]; // set HTML so multiple <p> blocks render
        } else {
          infoDiv.style.display = 'none';
          infoDiv.textContent = '';
        }
      }
    </script>
